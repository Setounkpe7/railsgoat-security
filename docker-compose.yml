services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    image: railsgoat-security:local
    environment:
      RAILS_ENV: production
      RAILS_LOG_TO_STDOUT: "1"
      RAILS_SERVE_STATIC_FILES: "1"
      SECRET_KEY_BASE: "${SECRET_KEY_BASE:?run: export SECRET_KEY_BASE=$$(openssl rand -hex 64)}"
      RAILSGOAT_KEY: "${RAILSGOAT_KEY:?run: export RAILSGOAT_KEY=$$(openssl rand -hex 32)}"
    ports:
      - "3000:3000"
    healthcheck:
      test: ["CMD", "curl", "-fsS", "http://localhost:3000/"]
      interval: 10s
      timeout: 3s
      retries: 3
      start_period: 30s
