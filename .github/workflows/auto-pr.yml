name: Auto PR dev to main

on:
  push:
    branches: [dev]

permissions:
  contents: read
  pull-requests: write

jobs:
  open-or-update-pr:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Open or update PR dev to main
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -euo pipefail
          existing=$(gh pr list --base main --head dev --json number --jq '.[0].number // ""')
          if [ -n "$existing" ]; then
            echo "PR #$existing already open; nothing to do."
            exit 0
          fi
          gh pr create \
            --base main \
            --head dev \
            --title "Merge dev to main" \
            --body "Auto-generated PR. The Security pipeline (security.yml) runs on this PR. Merge when all required status checks are green."
